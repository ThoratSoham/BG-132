<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - NeoBank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i data-lucide="zap"></i> NeoBank
            </div>
            <ul class="nav-links">
                <li><a href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
                <li><a href="accounts.html"><i data-lucide="wallet"></i> Accounts</a></li>
                <li><a href="cards.html"><i data-lucide="credit-card"></i> Cards</a></li>
                <li><a href="payments.html"><i data-lucide="send"></i> Payments</a></li>
                <li><a href="profile.html"><i data-lucide="user"></i> Profile</a></li>
                <li style="margin-top: 2rem;"><a href="#" onclick="logout()"><i data-lucide="log-out"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="menu-toggle" id="menu-toggle"><i data-lucide="menu"></i></button>
                <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                    <h1 class="page-title fade-in">Notifications</h1>
                    <button class="btn btn-secondary" onclick="clearNotifications()">Clear All</button>
                </div>
            </header>

            <div class="fade-in">
                <div style="background: var(--surface-dark); border: 1px solid var(--surface-border); border-radius: 16px; overflow: hidden;" id="notifs-container">
                    <!-- Injected -->
                </div>
            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderNotifications();
        });

        function renderNotifications() {
            const notifsContainer = document.getElementById('notifs-container');
            const notifs = window.DB.getNotifications();
            
            notifsContainer.innerHTML = '';

            if(notifs.length === 0) {
                notifsContainer.innerHTML = '<div style="padding: 3rem; text-align: center; color: var(--text-muted);">You have no new notifications.</div>';
                return;
            }

            notifs.forEach(n => {
                const icon = n.title.includes("Security") ? 'shield-alert' : 
                             n.title.includes("Payment") ? 'credit-card' : 'bell';
                
                const html = `
                    <div style="display:flex; gap: 1.5rem; padding: 1.5rem; border-bottom: 1px solid var(--surface-border); align-items: center;">
                        <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--bg-dark); display:flex; align-items:center; justify-content:center; color: var(--primary-color);">
                            <i data-lucide="${icon}"></i>
                        </div>
                        <div>
                            <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 0.25rem;">${n.title}</div>
                            <div style="color: var(--text-muted); font-size: 0.875rem;">${n.message}</div>
                            <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.5rem; opacity: 0.7;">${window.formatDate(n.date)}</div>
                        </div>
                    </div>
                `;
                notifsContainer.insertAdjacentHTML('beforeend', html);
            });
            if(window.lucide) window.lucide.createIcons();
        }

        window.clearNotifications = function() {
            localStorage.setItem("notifications", JSON.stringify([]));
            renderNotifications();
            window.showToast("Notifications cleared.", "success");
        };

        function logout() { localStorage.setItem('isLoggedIn', 'false'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
