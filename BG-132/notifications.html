<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - NeoBank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth-guard.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i data-lucide="zap"></i> NeoBank
            </div>
            <ul class="nav-links">
                <li><a href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
                <li><a href="accounts.html"><i data-lucide="wallet"></i> Accounts</a></li>
                <li><a href="cards.html"><i data-lucide="credit-card"></i> Cards</a></li>
                <li><a href="payments.html"><i data-lucide="send"></i> Payments</a></li>
                <li><a href="profile.html"><i data-lucide="user"></i> Profile</a></li>
                <li style="margin-top: 2rem;"><a href="#" onclick="logout(event)"><i data-lucide="log-out"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="menu-toggle" id="menu-toggle"><i data-lucide="menu"></i></button>
                <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
                    <h1 class="page-title fade-in">Notifications</h1>
                    <button class="btn btn-secondary" onclick="clearNotifications()">Clear All</button>
                </div>
            </header>

            <div class="fade-in">
                <div style="background: var(--surface-dark); border: 1px solid var(--surface-border); border-radius: 16px; overflow: hidden;" id="notifs-container">
                    <div style="display:flex; gap: 1.5rem; padding: 1.5rem; border-bottom: 1px solid var(--surface-border); align-items: center;">
                        <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--bg-dark); display:flex; align-items:center; justify-content:center; color: var(--primary-color);">
                            <i data-lucide="shield-alert"></i>
                        </div>
                        <div>
                            <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 0.25rem;">Security Alert</div>
                            <div style="color: var(--text-muted); font-size: 0.875rem;">New login from Windows device.</div>
                            <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.5rem; opacity: 0.7;">Apr 03, 02:00 PM</div>
                        </div>
                    </div>
                    <div style="display:flex; gap: 1.5rem; padding: 1.5rem; border-bottom: 1px solid var(--surface-border); align-items: center;">
                        <div style="width: 48px; height: 48px; border-radius: 50%; background: var(--bg-dark); display:flex; align-items:center; justify-content:center; color: var(--primary-color);">
                            <i data-lucide="credit-card"></i>
                        </div>
                        <div>
                            <div style="font-weight: 600; font-size: 1.1rem; margin-bottom: 0.25rem;">Payment Reminder</div>
                            <div style="color: var(--text-muted); font-size: 0.875rem;">Credit card bill due in 3 days.</div>
                            <div style="color: var(--text-muted); font-size: 0.75rem; margin-top: 0.5rem; opacity: 0.7;">Apr 02, 10:00 AM</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        lucide.createIcons();
        window.clearNotifications = function() {
            document.getElementById('notifs-container').innerHTML = '<div style="padding: 3rem; text-align: center; color: var(--text-muted);">You have no new notifications.</div>';
        };

    </script>
</body>
</html>
