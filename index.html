<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoBank - Log In</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, var(--surface-dark), var(--bg-darker));
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            text-align: center;
        }

        .auth-header {
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-muted);
        }

        .form-group {
            text-align: left;
        }

        .btn-full {
            width: 100%;
            margin-top: 1rem;
        }

        .otp-section {
            display: none;
            flex-direction: column;
            gap: 1rem;
        }

        .otp-inputs {
            display: flex;
            gap: 0.5rem;
            justify-content: space-between;
        }

        .otp-inputs input {
            width: 48px;
            height: 56px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
        }

        .toggle-form {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .toggle-form a {
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="glass auth-container fade-in">
        <div class="auth-header">
            <h1><i data-lucide="zap"></i> NeoBank</h1>
            <p id="form-subtitle">Secure access to your finances</p>
        </div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <div style="position: relative;">
                    <i data-lucide="mail" style="position: absolute; left: 12px; top: 12px; color: var(--text-muted);"></i>
                    <input type="email" id="email" class="form-control" placeholder="user@demo.com" style="padding-left: 40px;" required value="user@demo.com">
                </div>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative;">
                    <i data-lucide="lock" style="position: absolute; left: 12px; top: 12px; color: var(--text-muted);"></i>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" style="padding-left: 40px;" required value="password123">
                </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                Continue <i data-lucide="arrow-right"></i>
            </button>
        </form>

        <!-- OTP Simulation Section -->
        <form id="otp-form" class="otp-section fade-in">
            <p style="font-size: 0.875rem; color: var(--text-muted); text-align: left;">
                We've sent a code to your registered device. Enter it below to verify your identity.
            </p>
            <div class="otp-inputs">
                <input type="text" class="form-control" maxlength="1" id="otp-1">
                <input type="text" class="form-control" maxlength="1" id="otp-2">
                <input type="text" class="form-control" maxlength="1" id="otp-3">
                <input type="text" class="form-control" maxlength="1" id="otp-4">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                Verify & Login
            </button>
            <button type="button" id="btn-cancel-otp" class="btn btn-secondary btn-full" style="margin-top: 0.5rem;">
                Cancel
            </button>
        </form>

        <div class="toggle-form" id="signup-prompt">
            New here? <a>Create an account</a>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
