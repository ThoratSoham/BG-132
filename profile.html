<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - NeoBank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-header {
            display: flex; align-items: center; gap: 2rem;
            background: var(--surface-dark); padding: 2rem; border-radius: 16px;
            margin-bottom: 2rem; border: 1px solid var(--surface-border);
        }

        .profile-avatar-large {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 700; color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .profile-info h2 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .profile-info p { color: var(--text-muted); font-size: 0.875rem; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        
        @media (max-width: 768px) {
            .settings-grid { grid-template-columns: 1fr; }
            .profile-header { flex-direction: column; text-align: center; }
        }

        .settings-card {
            background: var(--surface-dark); border: 1px solid var(--surface-border);
            border-radius: 16px; padding: 1.5rem;
        }

        .linked-account {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem; background: var(--bg-dark); border-radius: 12px;
            margin-bottom: 1rem; border: 1px solid var(--surface-border);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/auth-guard.js?v=3"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i data-lucide="zap"></i> NeoBank
            </div>
            <ul class="nav-links">
                <li><a href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
                <li><a href="accounts.html"><i data-lucide="wallet"></i> Accounts</a></li>
                <li><a href="cards.html"><i data-lucide="credit-card"></i> Cards</a></li>
                <li><a href="payments.html"><i data-lucide="send"></i> Payments</a></li>
                <li><a href="profile.html" class="active"><i data-lucide="user"></i> Profile</a></li>
                <li style="margin-top: 2rem;"><a href="#" onclick="logout()"><i data-lucide="log-out"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="menu-toggle" id="menu-toggle"><i data-lucide="menu"></i></button>
                <h1 class="page-title fade-in">My Profile</h1>
            </header>

            <div class="fade-in">
                
                <!-- Profile Header -->
                <div class="profile-header">
                    <div class="profile-avatar-large" id="prof-avatar">JD</div>
                    <div class="profile-info">
                        <h2 id="prof-name">John Doe</h2>
                        <p id="prof-email">user@demo.com</p>
                        <p id="prof-phone" style="margin-top: 0.5rem;">+1 555-0198</p>
                    </div>
                </div>

                <div class="settings-grid">
                    <!-- Linked Accounts -->
                    <div class="settings-card">
                        <h3 class="section-title">Linked Accounts</h3>
                        <div id="linked-accounts-container">
                            <div class="linked-account">
                                <div style="width:40px; height:40px; border-radius:8px; background:white; color:black; display:flex; align-items:center; justify-content:center; font-weight:bold;">
                                    <i data-lucide="landmark"></i>
                                </div>
                                <div style="font-weight: 500;">SBI - ****1234</div>
                            </div>
                            <div class="linked-account">
                                <div style="width:40px; height:40px; border-radius:8px; background:white; color:black; display:flex; align-items:center; justify-content:center; font-weight:bold;">
                                    <i data-lucide="landmark"></i>
                                </div>
                                <div style="font-weight: 500;">HDFC - ****9876</div>
                            </div>
                        </div>
                        <button class="btn btn-secondary btn-full" id="btn-add-account">
                            + Add New Account
                        </button>
                        
                        <div id="add-account-form" style="display: none; margin-top: 1rem; border-top: 1px solid var(--surface-border); padding-top: 1rem;">
                            <div class="form-group" style="margin-bottom: 0.5rem;">
                                <label>Bank / Financial Institution</label>
                                <input type="text" id="new-bank-name" class="form-control" placeholder="e.g. Chase Bank">
                            </div>
                            <div class="form-group" style="margin-bottom: 0.5rem;">
                                <label>Card / Account Number</label>
                                <input type="text" id="new-account-num" class="form-control" placeholder="e.g. **** 4321" maxlength="20">
                            </div>
                            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                                <button class="btn btn-primary" style="flex: 1;" id="btn-save-account">Save</button>
                                <button class="btn btn-secondary" style="flex: 1;" id="btn-cancel-account">Cancel</button>
                            </div>
                        </div>
                    </div>

                    <!-- App Preferences -->
                    <div class="settings-card">
                        <h3 class="section-title">Preferences</h3>
                        
                        <div class="form-group">
                            <label>Design Theme</label>
                            <select class="form-control" id="theme-selector" style="appearance:none;">
                                <option value="dark">Dark Mode</option>
                                <option value="light">Light Mode</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Language</label>
                            <select class="form-control" style="appearance:none;">
                                <option>English (US)</option>
                                <option>Spanish</option>
                                <option>French</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Currency Display</label>
                            <select class="form-control" style="appearance:none;">
                                <option>USD ($)</option>
                                <option>EUR (€)</option>
                            </select>
                        </div>
                        
                        <h3 class="section-title" style="margin-top: 2rem; color: var(--danger);">Danger Zone</h3>
                        <button class="btn btn-danger btn-full" onclick="logout()">Terminate Session</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if(window.lucide) window.lucide.createIcons();

            const themeSelector = document.getElementById('theme-selector');
            if(themeSelector) {
                themeSelector.value = localStorage.getItem('theme') || 'dark';
                themeSelector.addEventListener('change', (e) => {
                    const selectedMode = e.target.value;
                    localStorage.setItem('theme', selectedMode);
                    document.documentElement.setAttribute('data-theme', selectedMode);
                });
            }
            
            // Link Account Logic
            const addBtn = document.getElementById('btn-add-account');
            const formDiv = document.getElementById('add-account-form');
            const cancelBtn = document.getElementById('btn-cancel-account');
            const saveBtn = document.getElementById('btn-save-account');
            const container = document.getElementById('linked-accounts-container');

            // Creating a local instance for maximum reliability (same as index.html)
            const SUPABASE_URL = 'https://ozpfohheqvaxmzzrujuj.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im96cGZvaGhlcXZheG16enJ1anVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzOTU4NDIsImV4cCI6MjA5MTk3MTg0Mn0.77C7H8PLBXNuvad_AETmuwYra-9Na8msuazERSdkkMU';
            const localSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
             
            addBtn.addEventListener('click', () => {
                formDiv.style.display = 'block';
                addBtn.style.display = 'none';
            });
             
            cancelBtn.addEventListener('click', () => {
                formDiv.style.display = 'none';
                addBtn.style.display = 'block';
                document.getElementById('new-bank-name').value = '';
                document.getElementById('new-account-num').value = '';
            });
            
            const appendAccountToUI = (bank, num) => {
                const div = document.createElement('div');
                div.className = 'linked-account fade-in';
                div.innerHTML = `
                     <div style="width:40px; height:40px; border-radius:8px; background:white; color:black; display:flex; align-items:center; justify-content:center; font-weight:bold;">
                         <i data-lucide="landmark"></i>
                     </div>
                     <div style="font-weight: 500;">${bank} - ${num}</div>
                `;
                container.appendChild(div);
                if(window.lucide) window.lucide.createIcons();
            };
             
            const loadAccounts = async () => {
                const { data: { user } } = await localSupabase.auth.getUser();
                if (!user) return;
                
                const { data, error } = await localSupabase
                    .from('linked_accounts')
                    .select('*')
                    .order('created_at', { ascending: true });
                    
                if (!error && data) {
                    if (data.length > 0) {
                        container.innerHTML = ''; 
                    }
                    data.forEach(acc => {
                        appendAccountToUI(acc.bank_name, acc.account_number);
                    });
                } else if (error) {
                    console.error('Fetch error:', error);
                }
            };
            
            saveBtn.addEventListener('click', async () => {
                const bankName = document.getElementById('new-bank-name').value.trim();
                const accNum = document.getElementById('new-account-num').value.trim();
                
                if (!bankName || !accNum) {
                    if(window.showToast) window.showToast('Please fill all fields', 'warning');
                    else alert('Please fill all fields');
                    return;
                }
                
                saveBtn.innerHTML = 'Saving...';
                saveBtn.disabled = true;
                
                try {
                    const { data: { user }, error: userError } = await localSupabase.auth.getUser();
                    
                    if (userError || !user) {
                         if(window.showToast) window.showToast('Authentication error: Not logged in', 'error');
                         saveBtn.innerHTML = 'Save';
                         saveBtn.disabled = false;
                         return;
                    }
                    
                    const { data, error } = await localSupabase
                        .from('linked_accounts')
                        .insert([{ user_id: user.id, bank_name: bankName, account_number: accNum }])
                        .select();
                        
                    if (error) {
                        alert('Database Error: ' + error.message + '\n\nHint: Ensure you ran the SQL script in Supabase dashboard to create the table.');
                        console.error(error);
                    } else {
                        if(window.showToast) window.showToast('Account added safely!', 'success');
                        
                        // If this is the FIRST item created, clear the hardcoded dummies out
                        if (container.innerHTML.includes('SBI - ****1234')) {
                            container.innerHTML = '';
                        }
                        
                        appendAccountToUI(bankName, accNum);
                        cancelBtn.click(); // Close and reset form
                    }
                } catch (err) {
                    alert('An unexpected error occurred: ' + err.message);
                    console.error(err);
                } finally {
                    saveBtn.innerHTML = 'Save';
                    saveBtn.disabled = false;
                }
            });
            
            // Execute on load
            loadAccounts();
        });
    </script>
</body>
</html>
