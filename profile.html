<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - NeoBank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .profile-header {
            display: flex; align-items: center; gap: 2rem;
            background: var(--surface-dark); padding: 2rem; border-radius: 16px;
            margin-bottom: 2rem; border: 1px solid var(--surface-border);
        }

        .profile-avatar-large {
            width: 100px; height: 100px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            display: flex; align-items: center; justify-content: center;
            font-size: 2.5rem; font-weight: 700; color: white;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .profile-info h2 { font-size: 1.5rem; margin-bottom: 0.25rem; }
        .profile-info p { color: var(--text-muted); font-size: 0.875rem; }

        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        
        @media (max-width: 768px) {
            .settings-grid { grid-template-columns: 1fr; }
            .profile-header { flex-direction: column; text-align: center; }
        }

        .settings-card {
            background: var(--surface-dark); border: 1px solid var(--surface-border);
            border-radius: 16px; padding: 1.5rem;
        }

        .linked-account {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem; background: var(--bg-dark); border-radius: 12px;
            margin-bottom: 1rem; border: 1px solid var(--surface-border);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i data-lucide="zap"></i> NeoBank
            </div>
            <ul class="nav-links">
                <li><a href="dashboard.html"><i data-lucide="layout-dashboard"></i> Dashboard</a></li>
                <li><a href="accounts.html"><i data-lucide="wallet"></i> Accounts</a></li>
                <li><a href="cards.html"><i data-lucide="credit-card"></i> Cards</a></li>
                <li><a href="payments.html"><i data-lucide="send"></i> Payments</a></li>
                <li><a href="profile.html" class="active"><i data-lucide="user"></i> Profile</a></li>
                <li style="margin-top: 2rem;"><a href="#" onclick="logout()"><i data-lucide="log-out"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="menu-toggle" id="menu-toggle"><i data-lucide="menu"></i></button>
                <h1 class="page-title fade-in">My Profile</h1>
            </header>

            <div class="fade-in">
                
                <!-- Profile Header -->
                <div class="profile-header">
                    <div class="profile-avatar-large" id="prof-avatar">..</div>
                    <div class="profile-info">
                        <h2 id="prof-name">Loading...</h2>
                        <p id="prof-email">loading@demo.com</p>
                        <p id="prof-phone" style="margin-top: 0.5rem;">+1 000-0000</p>
                    </div>
                </div>

                <div class="settings-grid">
                    <!-- Linked Accounts -->
                    <div class="settings-card">
                        <h3 class="section-title">Linked Accounts</h3>
                        <div id="linked-accounts-container">
                            <!-- Injected -->
                        </div>
                        <button class="btn btn-secondary btn-full" onclick="showToast('Linking accounts is a premium feature.', 'warning')">
                            + Add New Account
                        </button>
                    </div>

                    <!-- App Preferences -->
                    <div class="settings-card">
                        <h3 class="section-title">Preferences</h3>
                        
                        <div class="form-group">
                            <label>Design Theme</label>
                            <select class="form-control" id="theme-selector" style="appearance:none;">
                                <option value="dark">Dark Mode</option>
                                <option value="light">Light Mode</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Language</label>
                            <select class="form-control" style="appearance:none;">
                                <option>English (US)</option>
                                <option>Spanish</option>
                                <option>French</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Currency Display</label>
                            <select class="form-control" style="appearance:none;">
                                <option>USD ($)</option>
                                <option>EUR (€)</option>
                            </select>
                        </div>
                        
                        <h3 class="section-title" style="margin-top: 2rem; color: var(--danger);">Danger Zone</h3>
                        <button class="btn btn-danger btn-full" onclick="logout()">Terminate Session</button>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = window.DB.getCurrentUser();
            if(user) {
                document.getElementById('prof-avatar').innerText = user.avatarLetters;
                document.getElementById('prof-name').innerText = user.name;
                document.getElementById('prof-email').innerText = user.email;
                document.getElementById('prof-phone').innerText = user.phone;

                const lnkContainer = document.getElementById('linked-accounts-container');
                if(lnkContainer && user.linkedAccounts) {
                    lnkContainer.innerHTML = '';
                    user.linkedAccounts.forEach(acc => {
                        lnkContainer.insertAdjacentHTML('beforeend', `
                            <div class="linked-account">
                                <div style="width:40px; height:40px; border-radius:8px; background:white; color:black; display:flex; align-items:center; justify-content:center; font-weight:bold;">
                                    <i data-lucide="landmark"></i>
                                </div>
                                <div style="font-weight: 500;">${acc}</div>
                            </div>
                        `);
                    });
                }
            }
            if(window.lucide) window.lucide.createIcons();

            const themeSelector = document.getElementById('theme-selector');
            if(themeSelector) {
                themeSelector.value = localStorage.getItem('theme') || 'dark';
                themeSelector.addEventListener('change', (e) => {
                    const selectedMode = e.target.value;
                    localStorage.setItem('theme', selectedMode);
                    document.documentElement.setAttribute('data-theme', selectedMode);
                    window.showToast("Theme updated successfully!", "success");
                });
            }
        });

        function logout() { localStorage.setItem('isLoggedIn', 'false'); window.location.href = 'index.html'; }
    </script>
</body>
</html>
